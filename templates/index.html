<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eyecept</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>

{% include 'header-auth.html' %}

<main class="index-page">
  <div class="index-container">
    <div class="index-content">

      <div class="index-image-section">
        <img
          src="{{ url_for('static', filename='images/ai-security.jpg') }}"
          alt="AI Security Surveillance"
          class="index-image"
          style="width: 220px; height: auto;"
        >
      </div>

      <div class="index-text-section">
        <h1 class="index-title"><br>Welcome to Eyecept<br></h1>

        <p class="index-description">
          <br>Eyecept Security System Real-time monitoring and intelligent threat detection.<br>
        </p>

        <br>

        <div class="index-buttons">
          {% if show_register %}
            <a href="{{ url_for('register') }}">
              <button class="index-btn primary-btn">Register</button>
            </a>
          {% endif %}

          <a href="{{ url_for('login') }}">
            <button class="index-btn primary-btn">Login</button>
          </a>
        </div>

        <br>
      </div>

    </div>
  </div>
</main>

{% include 'footer.html' %}

</body>
</html>
