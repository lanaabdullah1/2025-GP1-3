<header class="main-header">
  <div class="header-container">

    <div class="header-logo">
      <a href="{{ url_for('dashboard') }}" class="brand">
        <img src="{{ url_for('static', filename='images/Logo.PNG') }}" alt="Eyecept Logo" class="brand-logo">
      </a>
    </div>

    <nav class="nav-links">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('account') }}">Account</a>
      <a href="#" class="logout-link" id="logoutBtn">Logout</a>
    </nav>

  </div>
</header>

<!-- LOGOUT MODAL -->
<div id="logoutModal" class="modal" style="display: none;">
  <div class="modal-box">
    <h3>Confirm Logout</h3>
    <p>Are you sure you want to log out?</p>

    <div class="modal-actions">
      <button type="button" id="cancelLogout">Cancel</button>
      <button type="button" id="confirmLogout" class="danger-btn">Logout</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const logoutBtn = document.getElementById("logoutBtn");
  const logoutModal = document.getElementById("logoutModal");
  const cancelLogout = document.getElementById("cancelLogout");
  const confirmLogout = document.getElementById("confirmLogout");

  if (logoutBtn && logoutModal && cancelLogout && confirmLogout) {
    logoutBtn.addEventListener("click", function (e) {
      e.preventDefault();
      logoutModal.style.display = "flex";
    });

    cancelLogout.addEventListener("click", function () {
      logoutModal.style.display = "none";
    });

    confirmLogout.addEventListener("click", function () {
      window.location.href = "{{ url_for('logout') }}";
    });

    window.addEventListener("click", function (e) {
      if (e.target === logoutModal) {
        logoutModal.style.display = "none";
      }
    });
  }
});
</script>
