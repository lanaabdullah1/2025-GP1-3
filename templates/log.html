<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Eyecept</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/log.css') }}">
</head>

<body>

{% include 'header-auth.html' %}

<main class="login-main">
  <div class="login-box">

    <img src="{{ url_for('static', filename='images/logo.png') }}" class="login-logo" alt="Eyecept Logo">

    <h2>Login</h2>

    {% if error %}
      <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form class="login-form" action="/login" method="POST">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <p class="forgot-password" id="forgotPassword">Forgot Password?</p>
      <button type="submit">Login</button>
    </form>

  </div>
</main>

{% include 'footer.html' %}

<script src="{{ url_for('static', filename='js/include.js') }}"></script>

</body>
</html>
