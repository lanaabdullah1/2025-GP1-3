<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eyecept | Register</title>
  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">


</head>
<body>

  

  <!-- HEADER -->
    {% include 'header-auth.html' %}

  <!-- PAGE CONTENT -->
  <main>
   <div class="card register-card">
      <h1 class="form-title">Delete User</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-messages">
          {% for message in messages %}
            <p class="flash-message">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

  <form class="register-form" method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="Enter First Name" required>
        </div>



         <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Enter Last Name" required>
        </div>


        <div class="form-group">
          <label for="phoneNumber">Phone Number</label>
          <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter Phone Number" required>
        </div>





        <div class="form-group">
          <label for="shiftType">Shift Type</label>


          <select id="shiftType" name="shiftType" required>
            <option value="" disabled selected hidden>Select shift type</option>

            <optgroup label="Weekdays">

            <option value="wd_morning">Morning</option>
            <option value="wd_evening">Evening</option>
            <option value="wd_night">Night</option>

            </optgroup>

            <optgroup label="Weekend">

            <option value="we_morning">Morning</option>
            <option value="we_evening">Evening</option>
            <option value="we_night">Night</option>
            
            </optgroup>
    </select>



        </div>

        <button type="submit" class="submit-btn">Add</button>
      </form>
    </div>
  </main>

  <!-- LOGOUT MODAL -->
  <div id="logoutModal" class="modal">
    <div class="modal-box">
      <h3>Confirm Logout</h3>
      <p>Are you sure you want to log out?</p>
      <div class="modal-actions">
        <button id="cancelLogout">Cancel</button>
        <button id="confirmLogout" class="danger-btn">Logout</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  {% include 'footer.html' %}

  <!-- LOAD HEADER + FOOTER -->
  <script src="include.js"></script> <script src="{{ url_for('static', filename='js/include.js') }}"></script>





</body>
</html>
