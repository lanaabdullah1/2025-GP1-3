<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Eyecept</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/log.css">
</head>

<body>

<div id="header-placeholder"></div>

<main class="login-main">
  <div class="login-box">

    <img src="images/logo.png" class="login-logo" alt="Eyecept Logo">
    <h2>Login</h2>

    <!-- رسالة خطأ ثابتة (اختياري) -->
    <!-- تقدر تحذفها أو تتحكم فيها بـ JS لاحقًا -->
    <!-- <p style="color:red;">Wrong login</p> -->

    <form class="login-form" action="login_process.php" method="POST">
      <input type="email" name="email" placeholder="Email">
      <input type="password" name="password" placeholder="Password">
      <p class="forgot-password" id="forgotPassword">Forgot Password?</p>
      <button type="submit">Login</button>
    </form>

  </div>
</main>

<div id="footer-placeholder"></div>

<script src="js/include.js"></script>
</body>
</html>
