
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f1117;
  color: #e2e8f0;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
}

main {
  padding: 16px 20px;
}

.page-wrapper {
  display: grid;
  grid-template-columns: 70% 1fr;
  gap: 16px;
  align-items: start;
}

/* ══════════════════════
   LEFT — 12 CAMERAS
══════════════════════ */
.live-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.section-label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #6ee7f7;
}

.live-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.live-feed {
  background: #1a1d27;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #2d3148;
  position: relative;
  aspect-ratio: 16/10;
  width: 100%;
}

.live-badge {
  position: absolute;
  top: 6px; left: 6px;
  background: #ef4444;
  color: white;
  font-size: 0.55rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 3px;
  z-index: 2;
}
.live-badge::before {
  content: '';
  width: 4px; height: 4px;
  background: white;
  border-radius: 50%;
  animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.cam-label {
  position: absolute;
  bottom: 5px; left: 6px;
  background: rgba(0,0,0,0.65);
  color: #cbd5e1;
  font-size: 0.58rem;
  padding: 2px 6px;
  border-radius: 4px;
  z-index: 2;
}

.video-placeholder {
  width: 100%;
  height: 100%;
  background: #0d1117;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #4a5568;
  font-size: 0.62rem;
  gap: 5px;
}
.video-placeholder svg { opacity: 0.18; }

/* ══════════════════════
   RIGHT — SNAPSHOT TABLE
══════════════════════ */
.snapshots-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.snapshots-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.snapshots-header .count {
  font-size: 0.72rem;
  color: #64748b;
}

.table-wrapper {
  background: #1a1d27;
  border-radius: 12px;
  border: 1px solid #2d3148;
  overflow: hidden;
}

.snap-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.76rem;
}

.snap-table th {
  background: #141720;
  color: #64748b;
  font-weight: 600;
  padding: 10px 14px;
  text-align: left;
  font-size: 0.67rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid #2d3148;
}

.snap-table td {
  padding: 12px 14px;
  border-bottom: 1px solid #1e2235;
  color: #cbd5e1;
  vertical-align: middle;
}

.snap-table tr:last-child td { border-bottom: none; }

.snap-table tbody tr {
  cursor: pointer;
  transition: background 0.15s;
}
.snap-table tbody tr:hover td { background: #1e2235; }

.level-badge {
  display: inline-block;
  padding: 4px 11px;
  border-radius: 20px;
  font-size: 0.68rem;
  font-weight: 700;
  white-space: nowrap;
}
.level-1 { background: #fef9c3; color: #92400e; }
.level-2 { background: #fed7aa; color: #9a3412; }
.level-3 { background: #fecaca; color: #991b1b; }

.arrow-hint {
  color: #4a5568;
  font-size: 1rem;
  text-align: right;
}
</style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}">
</head>
<body>

{% include 'header-main.html' %}

<main>
<div class="page-wrapper">

  <!-- ═══ LEFT: 12 CAMERAS ═══ -->
  <div class="live-section">
    <div class="section-label">Live Cameras</div>
    <div class="live-grid">

      {% for i in range(1, 13) %}
      <div class="live-feed">
        <div class="live-badge">LIVE</div>
        <div class="cam-label">Cam {{ i }}</div>
        <div class="video-placeholder">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M15 10l4.553-2.552A1 1 0 0121 8.382v7.236a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          </svg>
          <span>No Signal</span>
        </div>
      </div>
      {% endfor %}

    </div>
  </div>

  <!-- ═══ RIGHT: SNAPSHOTS TABLE ═══ -->
  <div class="snapshots-section">
    <div class="snapshots-header">
      <div class="section-label">Snapshots</div>
      <span class="count">{{ snapshots|length }} events</span>
    </div>

    <div class="table-wrapper">
      <table class="snap-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Level</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {% for s in snapshots %}
          <tr onclick="goToDetails('{{ s.id }}')">
            <td>{{ loop.index }}</td>
            <td><span class="level-badge level-{{ s.level }}">Level {{ s.level }}</span></td>
            <td class="arrow-hint">›</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</div>
</main>

<script>
function goToDetails(id) {
  window.location.href = "/details/" + id;
}
</script>

{% include 'footer.html' %}

</body>
</html>
