{% extends "layouts/user_layout.html" %}

{% block content %}

<div class="row mb-3">

    <div class="col-md-2">
        <select id="usb_index" class="form-control">
            <option value="1">USB Camera 1</option>
            <option value="2">USB Camera 2</option>
        </select>
    </div>

    <div class="col-md-2">
        <button class="btn btn-primary" onclick="useUSB()">USB</button>
    </div>

    <div class="col-md-2">
        <input id="ip" class="form-control" placeholder="192.168.1.5:8080">
    </div>

    <div class="col-md-2">
        <button class="btn btn-success" onclick="useIP()">IP</button>
    </div>

    <div class="col-md-2">
<button class="btn btn-danger" onclick="stopCamera()">Stop</button>
    </div>
    <div class="col-md-2">
    <button class="btn btn-warning" onclick="resetROI()">Reset ROI</button>
</div>

</div>

<div id="status" class="mb-2 text-danger"></div>

<canvas id="canvas" style="width:100%; border-radius:10px;"></canvas>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let img = new Image();

let startX = 0, startY = 0, endX = 0, endY = 0;
let drawing = false;

function startStream() {
    img.src = "/video_feed?" + Date.now();
}

function reloadStream() {
    img.src = "/video_feed?" + Date.now();
}

function stopCamera() {
    img.src = "";
}

function useUSB() {
    let index = document.getElementById("usb_index")?.value || 1;

    fetch("/set_camera", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            type: "usb",
            index: index
        })
    }).then(() => reloadStream());
}

function useIP() {
    let ip = document.getElementById("ip").value;

    fetch("/set_camera", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            type: "ip",
            ip: ip
        })
    }).then(() => reloadStream());
}

function resetROI() {
    fetch("/reset_roi", { method: "POST" }).then(() => {
        drawing = false;
        startX = startY = endX = endY = 0;
        reloadStream();
    });
}

img.onload = function () {
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
};

function draw() {
    if (img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        if (drawing) {
            let x = Math.min(startX, endX);
            let y = Math.min(startY, endY);
            let w = Math.abs(endX - startX);
            let h = Math.abs(endY - startY);

            ctx.strokeStyle = "red";
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
        }
    }
    requestAnimationFrame(draw);
}
draw();

canvas.addEventListener("mousedown", (e) => {
    drawing = true;
    startX = e.offsetX;
    startY = e.offsetY;
});

canvas.addEventListener("mousemove", (e) => {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();

    endX = (e.clientX - rect.left) * (canvas.width / rect.width);
    endY = (e.clientY - rect.top) * (canvas.height / rect.height);
});

canvas.addEventListener("mouseup", (e) => {
    drawing = false;

    const rect = canvas.getBoundingClientRect();

    endX = (e.clientX - rect.left) * (canvas.width / rect.width);
    endY = (e.clientY - rect.top) * (canvas.height / rect.height);

    fetch("/set_roi", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            x1: Math.min(startX, endX),
            y1: Math.min(startY, endY),
            x2: Math.max(startX, endX),
            y2: Math.max(startY, endY)
        })
    });
});

window.onload = function () {
    startStream();
};
</script>
{% endblock %}
