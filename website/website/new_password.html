{% extends "layouts/guest_layout.html" %}

{% block content %}

<section class="">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-8">
                <div class="sec-heading center">
                    <h3>Set New Password</h3>

                    {% if error %}
                    <h5 class="text-red">{{ error }}</h5>
                    {% endif %}
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="resp_log_wrap">
                    <div class="resp_log_caption">

                        <form method="POST">

                            <div class="form-group">
                                <label>New Password <span class="text-danger">*</span></label>
                         <input name="password" type="password" class="form-control"
                            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}" required
                            title="Password must be at least 8 characters, include uppercase, lowercase, number, and special character">

                            </div>

                            <div class="form-group">
                                <label>Confirm Password <span class="text-danger">*</span></label>
                                     <input name="re_password" type="password" class="form-control"
                            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}" required
                            title="Password must be at least 8 characters, include uppercase, lowercase, number, and special character">

                            </div>

                            <div class="form-group">
                                <button class="btn btn-danger fw-medium full-width">
                                    Reset Password
                                </button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>

    </div>
</section>

{% endblock %}
