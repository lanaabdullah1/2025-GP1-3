{% extends "layouts/user_layout.html" %}

{% block content %}

<div class="frm_submit_block">
    <h4>My Profile</h4>

    {% if success %}
    <h5 class="text-green">{{ success }}</h5>
    {% endif %}

    {% if error %}
    <h5 class="text-red">{{ error }}</h5>
    {% endif %}

    <div class="frm_submit_wrap">
        <form method="POST">

            <div class="row">

                <div class="col-md-6">
                    <div class="form-group">
                        <label>Name</label>
                        <input name="name" type="text" class="form-control"
                           oninput="this.value = this.value.replace(/[^a-z,A-Z,أ-ي, ]/, '')"    value="{{ user[1] }}"  {% if is_operator %}disabled{% endif %}>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label>Email</label>
                        <input name="email" type="email" class="form-control"
                               value="{{ user[2] }}"  {% if is_operator %}disabled{% endif %}>
                    </div>
                </div>



                <div class="col-md-6">
                    <div class="form-group">
                        <label>Phone </label>
                
                   
                        <input name="phone" type="text" class="form-control" pattern="05[0-9]{8}" minlength="10"
                            maxlength="10" inputmode="numeric" value="{{ user[5] or '' }}" required
                            oninvalid="this.setCustomValidity('Phone number must start with 05 and be exactly 10 digits')"
                             oninput="if (/\D/g.test(this.value)) this.value = this.value.replace(/\D/g,'')">
               </div>
                </div>

            </div>

            <br>

            <div class="form-group text-left add_top_30">
                <button class="btn btn-danger fw-medium">
                    Update
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
