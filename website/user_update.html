{% extends "layouts/user_layout.html" %}

{% block content %}

<div class="frm_submit_block">
    <h4>Update User</h4>

    <br>

    {% if error %}
    <h5 class="text-red">{{ error }}</h5>
    {% endif %}

    {% if success %}
    <h5 class="text-green">{{ success }}</h5>
    {% endif %}

    <br>

    <div class="frm_submit_wrap">
        <form method="POST" action="/user_update/{{ user[0] }}">

            <div class="row">

                <!-- ROLE -->

                    <div class="col-md-6">
                        <div class="form-group">
                            <label>
                                Role <span class="text-danger">*</span>
                            </label>

                            <input type="text" class="form-control" value="{{ user[4] }}" readonly>
                        </div>
                    </div>

                

                <!-- NAME -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label>
                            Name <span class="text-danger">*</span>
                        </label>

                        <input name="name" type="text" class="form-control" value="{{ user[1] }}"
                            oninput="this.value = this.value.replace(/[^a-z,A-Z,أ-ي, ]/, '')" required>
                    </div>
                </div>

           
                    <!-- EMAIL -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>
                                Email <span class="text-danger">*</span>
                            </label>

                            <input name="email" type="email" class="form-control" value="{{ user[2] }}" required>
                        </div>
                    </div>



                <!-- PASSWORD -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Password</label>
                        <input name="password" type="password" class="form-control"
                            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}" 
                            placeholder="Leave empty if no change"
                            title="Password must be at least 8 characters, include uppercase, lowercase, number, and special character">


                    </div>
                </div>

                <!-- PHONE -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Phone</label>

                        <input name="phone" type="text" class="form-control" pattern="05[0-9]{8}" minlength="10"
                            maxlength="10" inputmode="numeric" value="{{ user[5] or '' }}" required
                            oninvalid="this.setCustomValidity('Phone number must start with 05 and be exactly 10 digits')"
                            oninput="if (/\D/g.test(this.value)) this.value = this.value.replace(/\D/g,'')">
                    </div>
                </div>

            </div>

            <br><br>

            <div class="form-group text-left add_top_30">
                <button type="submit" class="btn btn-danger fw-medium">
                    Update
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
